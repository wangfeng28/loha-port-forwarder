[messages.wizard.steps.external_ifs]
title = "External Interface"
description = "Choose the single external interface used as the entry surface."

[messages.wizard.steps.listen_ips]
title = "External IPv4 Addresses Used for Exposure"
description = "Enter one or more external IPv4 addresses used for exposure, separated by commas."

[messages.wizard.steps.default_snat_ip]
title = "Primary External IP"
description = "Choose the primary external IP used for default egress SNAT."

[messages.wizard.steps.lan_ifs]
title = "Internal Interfaces"
description = "Choose the internal interfaces managed by LOHA."

[messages.wizard.steps.lan_nets]
title = "Internal Networks"
description = "Enter one or more IPv4 CIDRs for the managed internal networks."

[messages.wizard.steps.protection_mode]
title = "Protection Scope"
description = "Choose what LOHA should protect from direct WAN access."

[messages.wizard.steps.protection_mode.options]
backends = "Exposed backends only"
nets = "User-specified protected networks"
both = "Exposed backends and user-specified protected networks"

[messages.wizard.steps.protected_nets]
title = "Protected Networks"
description = "Enter the IPv4 CIDRs that LOHA should treat as protected networks."

[messages.wizard.steps.enable_hairpin]
title = "Hairpin NAT"
description = "Decide whether internal hosts may reach exposed services through external IPs."

[messages.wizard.steps.enable_hairpin.options]
on = "Enable"
off = "Disable"

[messages.wizard.steps.enable_egress_snat]
title = "Default Egress NAT"
description = "Decide whether LOHA manages default egress SNAT for internal networks."

[messages.wizard.steps.enable_egress_snat.options]
on = "Enable"
off = "Disable"

[messages.wizard.steps.egress_nets]
title = "Egress NAT Networks"
description = "Enter the IPv4 CIDRs that should use LOHA-managed default egress SNAT."

[messages.wizard.steps.auth_mode]
title = "Authorization Marking"
description = "Choose how LOHA marks authorized connections. `ct mark` is the best default for most deployments."

[messages.wizard.steps.auth_mode.options]
mark = "[ct mark] Performance-first"
label = "[ct label] Easier isolation from existing mark rules"

[messages.wizard.steps.enable_wan_to_wan]
title = "Allow WAN-to-WAN Forwarding"
description = "Enable this only when external clients must use port forwarding on this gateway's exposure address to reach services on other external hosts. Most deployments can leave this disabled."

[messages.wizard.steps.enable_wan_to_wan.options]
on = "Enable"
off = "Disable"

[messages.wizard.steps.enable_tcpmss_clamp]
title = "Automatic TCP MSS Adjustment"
description = "Enable this when PMTU black holes are a risk; LOHA will adjust WAN egress TCP MSS to avoid stalled connections."

[messages.wizard.steps.enable_tcpmss_clamp.options]
on = "Enable"
off = "Disable"

[messages.wizard.steps.counter_mode]
title = "Rule Counters"
description = "Choose how many nft rule counters to keep for troubleshooting and traffic observation."

[messages.wizard.steps.counter_mode.options]
off = "Off"
minimal = "Minimal (important rules only)"
all = "All rules"

[messages.wizard.steps.enable_strict_validation]
title = "Strict Internal Source Validation"
description = "Drop internal traffic early when its source address does not match the expected trusted networks. Enable this only when you know which interfaces and IPv4 CIDRs should be trusted."

[messages.wizard.steps.enable_strict_validation.options]
on = "Enable"
off = "Disable"

[messages.wizard.steps.internal_ifs]
title = "Interfaces to Validate"
description = "Choose the internal interfaces that should use strict source validation."

[messages.wizard.steps.trusted_internal_nets]
title = "Trusted Source Networks"
description = "Enter the trusted IPv4 CIDRs allowed on those interfaces. Sources outside these ranges will be dropped early."

[messages.wizard.steps.rp_filter_mode]
title = "Advanced NAT Support (rp_filter)"
description = "Hairpin NAT and WAN-to-WAN forwarding may require a different rp_filter handling mode. Choose how LOHA should manage rp_filter."

[messages.wizard.steps.rp_filter_mode.options]
system = "Keep system defaults"
strict = "Strict (managed interfaces only)"
loose_scoped = "Loose (managed interfaces only)"
loose_global = "Loose (all interfaces)"

[messages.wizard.steps.conntrack_mode]
title = "Connection Capacity Tuning (conntrack)"
description = "Choose how LOHA manages concurrent connection capacity and conntrack tuning."

[messages.wizard.steps.conntrack_mode.options]
system = "Keep system defaults"
conservative = "[Conservative] 65k concurrent connections (better for low-memory systems)"
standard = "[Standard] 262k concurrent connections (fits most deployments)"
high = "[High] 1,048k concurrent connections (better for high-memory gateways)"
auto = "[Auto] Calculate from estimated peak concurrency and memory percentage"
custom = "[Custom] Enter the maximum concurrent connections manually"

[messages.wizard.steps.conntrack_peak]
title = "Estimated Peak Concurrent Connections"
description = "Enter the expected peak number of concurrent connections. LOHA will use this to calculate nf_conntrack_max automatically."

[messages.wizard.steps.conntrack_target_max]
title = "Maximum Concurrent Connections"
description = "Enter the maximum concurrent connections to set manually. This writes nf_conntrack_max."

[messages.wizard.steps.conntrack_memory_percent]
title = "Memory Share for Connection Tracking"
description = "Enter the percentage of system memory LOHA may use when planning conntrack capacity."

[glossary]
"external interface" = "External interface"
"exposure" = "Exposure"
"default egress NAT" = "Default Egress NAT"
"auth mode" = "Authorization mode"

