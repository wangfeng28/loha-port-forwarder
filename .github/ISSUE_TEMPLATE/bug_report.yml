name: Bug report
description: Report a reproducible defect in LOHA Port Forwarder.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke, and what were you trying to do?
      placeholder: A short description of the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the exact commands, config snippets, or menu actions.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect LOHA to do?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Host OS, kernel, Python, nftables, virtualization stack, and anything else relevant.
      placeholder: |
        Host OS:
        Kernel:
        Python:
        nftables:
        Virtualization / environment:
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostic output
      description: Paste relevant output from `loha doctor`, `loha config show`, logs, or rendered rules.
      render: shell
      placeholder: Paste logs or command output here.
